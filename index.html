<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aerial - 創作支援ツール</title>
    <style>
        :root {
            --primary: #5a67d8; --bg: #f8fafc; --sidebar-width: 240px;
            --card-bg: #ffffff; --text-main: #2d3748; --accent: #ed64a6; --danger: #e53e3e;
            --link: #3182ce;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* --- サイドバー（スマホ時は隠す） --- */
        .sidebar { 
            width: var(--sidebar-width); flex-shrink: 0; background: #2d3748; color: white; 
            display: flex; flex-direction: column; height: 100%; transition: 0.3s; z-index: 2000;
        }

        .logo { font-size: 1.4rem; font-weight: bold; text-align: center; padding: 30px 0; color: #a3bffa; letter-spacing: 2px; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .nav-item:hover { background: #4a5568; }
        .nav-item.active { background: #4a5568; border-left: 5px solid var(--primary); }

        /* --- モバイル用ヘッダー --- */
        .mobile-header {
            display: none; width: 100%; height: 60px; background: #2d3748; color: white;
            align-items: center; padding: 0 15px; position: fixed; top: 0; left: 0; z-index: 1500; box-sizing: border-box;
        }
        .menu-toggle { font-size: 24px; cursor: pointer; background: none; border: none; color: white; padding: 10px; }

        /* --- メインエリア --- */
        .main-content { 
            flex-grow: 1; overflow-y: auto; padding: 40px; display: none; box-sizing: border-box; 
            -webkit-overflow-scrolling: touch;
        }
        .main-content.active { display: block; }
        
        /* リストのグリッド設定（レスポンシブ） */
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }

        /* --- カード & アイテム --- */
        .item-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; position: relative; border-top: 4px solid var(--primary); }
        .del-btn { position: absolute; top: 10px; right: 10px; background: #fee2e2; color: var(--danger); border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 12px; z-index: 5; }

        .auto-link { color: var(--link); text-decoration: underline; font-weight: bold; }

        /* --- モーダル（スマホ時は全画面） --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { 
            background: white; width: 90%; max-width: 650px; padding: 25px; border-radius: 15px; 
            max-height: 85vh; overflow-y: auto; position: relative;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; /* ズーム防止 */ }
        
        /* --- アイデアボード（スマホ対応） --- */
        .board { background: #d69e7b; border: 8px solid #8b4513; border-radius: 12px; min-height: 400px; display: flex; flex-wrap: wrap; gap: 10px; padding: 15px; align-content: flex-start; }
        .note { width: calc(50% - 10px); height: 160px; background: #fff9c4; padding: 10px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; flex-shrink: 0; }
        .note-edit { flex-grow: 1; border: none; background: transparent; resize: none; outline: none; font-size: 14px; }

        /* ボタン */
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; gap: 5px; min-height: 44px; }
        .btn-main { background: var(--primary); color: white; width: auto; margin-bottom: 20px; }
        .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-close { background: #e2e8f0; color: #4a5568; margin-top: 10px; width: 100%; }

        /* --- スマホ表示用メディアクエリ --- */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute; left: -240px; width: 240px;
            }
            .sidebar.open { left: 0; }
            .sidebar-overlay {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1900;
            }
            .sidebar-overlay.open { display: block; }
            
            .mobile-header { display: flex; }
            .main-content { padding: 80px 15px 30px 15px; }
            
            .modal-content { width: 100%; height: 100%; max-height: 100vh; border-radius: 0; padding: 20px; }
            .list-grid { grid-template-columns: 1fr; }
            .note { width: 100%; } /* 付箋を1列に */
        }
    </style>
</head>
<body>

<header class="mobile-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div style="margin-left: 10px; font-weight: bold; letter-spacing: 1px;">AERIAL</div>
</header>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app-container">
    <nav class="sidebar" id="sidebar">
        <div class="logo">AERIAL</div>
        <div class="nav-item active" id="nav-char" onclick="navigate('char')">👤 キャラクター</div>
        <div class="nav-item" id="nav-world" onclick="navigate('world')">🌍 世界設定</div>
        <div class="nav-item" id="nav-config" onclick="navigate('config')">⚙ 質問設定</div>
        <div class="nav-item" id="nav-board" onclick="navigate('board')">📌 アイデアボード</div>
        <div class="nav-item" id="nav-data" onclick="navigate('data')">💾 データ管理</div>
    </nav>

    <main id="tab-char" class="main-content active">
        <h2>キャラクター設定</h2>
        <button class="btn btn-main" onclick="openModal('char')">+ 新規追加</button>
        <div id="char-list" class="list-grid"></div>
    </main>

    <main id="tab-world" class="main-content">
        <h2>世界設定</h2>
        <button class="btn btn-main" onclick="openModal('world')">+ 新規追加</button>
        <div id="world-list" class="list-grid"></div>
    </main>

    <main id="tab-config" class="main-content">
        <h2>深掘り質問設定</h2>
        <div id="custom-q-list" style="margin-bottom: 20px;"></div>
        <button class="btn btn-main" style="background:#4a5568;" onclick="addQuestionTemplate()">+ 項目追加</button>
    </main>

    <main id="tab-board" class="main-content">
        <h2>アイデアボード</h2>
        <button class="btn btn-main" onclick="addNote()">+ 付箋追加</button>
        <div class="board" id="cork-board"></div>
    </main>

    <main id="tab-data" class="main-content">
        <h2>データ管理</h2>
        <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd;">
            <p>作品データを保存・復元します。</p>
            <button class="btn btn-main" style="width: 100%;" onclick="downloadJSON()">ファイルを保存 (.json)</button>
            <div style="margin-top: 20px;">
                <label for="file-input" class="btn" style="background: var(--accent); color: white; width: 100%;">ファイルを読み込む</label>
                <input type="file" id="file-input" accept=".json" onchange="importJSON(event)">
            </div>
        </div>
    </main>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">入力</h3>
        <input type="hidden" id="edit-id">
        <input type="hidden" id="edit-type">
        <div id="form-fields"></div>
        <button class="btn btn-save" onclick="saveData()">保存</button>
        <button class="btn btn-close" onclick="closeModal()">キャンセル</button>
    </div>
</div>

<script>
    let db = { characters: [], worlds: [], notes: [], questions: ["大事にしているものは？", "窮地に追い込むには？"] };

    window.onload = () => {
        const saved = localStorage.getItem('aerial_v4_mobile');
        if (saved) db = JSON.parse(saved);
        renderAll();
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }

    function navigate(tabId) {
        showTab(tabId);
        if (window.innerWidth <= 768) toggleSidebar();
    }

    function showTab(tabId) {
        document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        document.getElementById('nav-' + tabId).classList.add('active');
        if(tabId === 'config') renderQuestionConfig();
    }

    function downloadJSON() {
        const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `aerial_backup.json`;
        link.click();
    }

    function importJSON(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                db = JSON.parse(e.target.result);
                updateStorage(); renderAll(); alert("読み込み完了");
            } catch (err) { alert("不正なファイルです"); }
        };
        reader.readAsText(event.target.files[0]);
    }

    function applyAutoLinks(text) {
        if (!text) return "";
        let linked = text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        const kws = [...db.characters.map(c=>({n:c.name,t:'char',id:c.id})),...db.worlds.map(w=>({n:w.name,t:'world',id:w.id}))].sort((a,b)=>b.n.length - a.n.length);
        kws.forEach(kw => { if(kw.n) linked = linked.replace(new RegExp(`(${kw.n})`, 'g'), `<span class="auto-link" onclick="event.stopPropagation(); jumpTo('${kw.t}', ${kw.id})">$1</span>`); });
        return linked;
    }

    function jumpTo(t, id) { showTab(t); openModal(t, id); }

    function renderQuestionConfig() {
        document.getElementById('custom-q-list').innerHTML = db.questions.map((q, i) => `
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" value="${q}" onchange="db.questions[${i}]=this.value; updateStorage();">
                <button class="btn" style="background:var(--danger); color:white; padding: 5px 15px;" onclick="db.questions.splice(${i},1); updateStorage(); renderQuestionConfig();">削除</button>
            </div>`).join('');
    }

    function addQuestionTemplate() { db.questions.push("新質問"); updateStorage(); renderQuestionConfig(); }

    function openModal(type, id = null) {
        document.getElementById('edit-type').value = type;
        document.getElementById('edit-id').value = id || "";
        const modal = document.getElementById('modal');
        const fields = document.getElementById('form-fields');
        modal.style.display = 'flex';
        let target = id ? db[type==='char'?'characters':'worlds'].find(item => item.id == id) : {};
        if (type === 'char') {
            document.getElementById('modal-title').innerText = "キャラ設定";
            let qHtml = db.questions.map(q => `<div class="q-box"><label>❓ ${q}</label><textarea class="dynamic-q" data-qname="${q}">${target.answers ? (target.answers[q] || "") : ""}</textarea></div>`).join('');
            fields.innerHTML = `<div class="form-group"><label>名前</label><input type="text" id="f-name" value="${target.name || ''}"></div><div class="form-group"><label>外見</label><textarea id="f-app">${target.app || ''}</textarea></div>${qHtml}`;
        } else {
            document.getElementById('modal-title').innerText = "世界設定";
            fields.innerHTML = `<div class="form-group"><label>項目名</label><input type="text" id="f-name" value="${target.name || ''}"></div><div class="form-group"><label>詳細</label><textarea id="f-detail">${target.detail || ''}</textarea></div>`;
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveData() {
        const type = document.getElementById('edit-type').value;
        const id = document.getElementById('edit-id').value;
        const col = type === 'char' ? 'characters' : 'worlds';
        const newData = { id: id ? parseInt(id) : Date.now(), name: document.getElementById('f-name').value || "無題" };
        if (type === 'char') { 
            newData.app = document.getElementById('f-app').value; 
            newData.answers = {}; 
            document.querySelectorAll('.dynamic-q').forEach(el => newData.answers[el.dataset.qname] = el.value); 
        } else { 
            newData.detail = document.getElementById('f-detail').value; 
        }
        if (id) { const idx = db[col].findIndex(item => item.id == id); db[col][idx] = newData; } else { db[col].push(newData); }
        updateStorage(); closeModal(); renderAll();
    }

    function deleteItem(type, id, event) {
        event.stopPropagation();
        if (!confirm("削除しますか？")) return;
        db[type==='char'?'characters':'worlds'] = db[type==='char'?'characters':'worlds'].filter(item => item.id != id);
        updateStorage(); renderAll();
    }

    function renderAll() {
        document.getElementById('char-list').innerHTML = db.characters.map(c => `<div class="item-card" onclick="openModal('char', ${c.id})"><button class="del-btn" onclick="deleteItem('char', ${c.id}, event)">削除</button><strong>${c.name}</strong><p style="font-size:0.8rem; color:#666; margin-top:10px;">${applyAutoLinks((c.app||"").substring(0,30))}...</p></div>`).join('');
        document.getElementById('world-list').innerHTML = db.worlds.map(w => `<div class="item-card" onclick="openModal('world', ${w.id})"><button class="del-btn" onclick="deleteItem('world', ${w.id}, event)">削除</button><strong>${w.name}</strong><p style="font-size:0.8rem; color:#666; margin-top:10px;">${applyAutoLinks((w.detail||"").substring(0,30))}...</p></div>`).join('');
        renderNotes();
    }

    function addNote() { db.notes.push({ id: Date.now(), content: "" }); updateStorage(); renderNotes(); }
    function deleteNote(id) { db.notes = db.notes.filter(n => n.id != id); updateStorage(); renderNotes(); }
    function renderNotes() {
        document.getElementById('cork-board').innerHTML = db.notes.map(n => `<div class="note"><textarea class="note-edit" oninput="db.notes.find(x=>x.id==${n.id}).content=this.value; updateStorage();" placeholder="メモ...">${n.content}</textarea><div style="text-align:right;"><span style="cursor:pointer; font-size:11px; color:var(--danger);" onclick="deleteNote(${n.id})">✖ 削除</span></div></div>`).join('');
    }
    function updateStorage() { localStorage.setItem('aerial_v4_mobile', JSON.stringify(db)); }
</script>
</body>
</html>
